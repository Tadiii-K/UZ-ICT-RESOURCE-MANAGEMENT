<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - UZ ICT Resource Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="images/uz-logo.png" alt="University of Zimbabwe" onerror="this.style.display='none'; this.parentElement.querySelector('i').style.display='block';">
                    <i class="bi bi-shield-fill" style="display:none;"></i>
                </div>
                <h1 class="login-title">UZ ICT Management</h1>
                <p class="login-subtitle">University of Zimbabwe</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="your@uz.ac.zw" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none" id="loginSpinner"></span>
                    Sign in
                </button>
            </form>
            
            <div class="login-footer">
                University of Zimbabwe · ICT Department
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
